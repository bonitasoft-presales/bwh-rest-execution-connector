ProcessBuilder.category=Process Builder Connectors
connectorDefinitionLabel=PB REST Execution
connectorDefinitionDescription=Multi-connector for executing REST API calls. Supports BASIC, BEARER, API_KEY, and OAuth2 authentication with automatic token management. Works with any REST service (Google Drive, SAP, custom APIs).

# Page 1: Authentication
authPage.pageTitle=Authentication
authPage.pageDescription=Configure the authentication method. Fill only the fields relevant to the selected auth type. Token management (OAuth2) is handled internally.
authTypeGroup.label=Authentication Type
authTypeWidget.label=Auth Type
authTypeWidget.description=Select the authentication method: NONE, BASIC, BEARER, API_KEY, OAUTH2_CLIENT_CREDENTIALS, or OAUTH2_PASSWORD
basicAuthGroup.label=Basic Authentication
usernameWidget.label=Username
usernameWidget.description=Username for BASIC or OAUTH2_PASSWORD authentication
passwordWidget.label=Password
passwordWidget.description=Password for BASIC or OAUTH2_PASSWORD authentication
bearerGroup.label=Bearer Token
tokenWidget.label=Bearer Token
tokenWidget.description=Static bearer token for BEARER authentication
apiKeyGroup.label=API Key
apiKeyNameWidget.label=API Key Name
apiKeyNameWidget.description=Header or query parameter name for the API key (e.g., X-API-Key)
apiKeyValueWidget.label=API Key Value
apiKeyValueWidget.description=The API key value
apiKeyLocationWidget.label=API Key Location
apiKeyLocationWidget.description=Where to send the API key: HEADER or QUERY parameter
oauth2Group.label=OAuth2 Configuration
tokenUrlWidget.label=Token URL
tokenUrlWidget.description=OAuth2 token endpoint URL (e.g., https://oauth2.googleapis.com/token)
clientIdWidget.label=Client ID
clientIdWidget.description=OAuth2 client ID
clientSecretWidget.label=Client Secret
clientSecretWidget.description=OAuth2 client secret
scopeWidget.label=Scope
scopeWidget.description=OAuth2 scope (e.g., https://www.googleapis.com/auth/drive.readonly)

# Page 2: Request Configuration
requestPage.pageTitle=Request Configuration
requestPage.pageDescription=Configure the HTTP method and target endpoint.
methodGroup.label=HTTP Method
httpMethodWidget.label=HTTP Method
httpMethodWidget.description=Select the HTTP method: GET, POST, PUT, DELETE, PATCH, HEAD, or OPTIONS
endpointGroup.label=Endpoint
urlWidget.label=Base URL
urlWidget.description=The base URL of the API (e.g., https://api.example.com)
pathWidget.label=Path
pathWidget.description=Optional path appended to the base URL (e.g., /v1/users). Supports {{param}} substitution.
contentTypeWidget.label=Content Type
contentTypeWidget.description=Content-Type header value (default: application/json)

# Page 3: Parameters & Options
paramsPage.pageTitle=Parameters & Options
paramsPage.pageDescription=Configure request body, headers, query parameters, and connection options.
bodyGroup.label=Request Data
bodyWidget.label=Request Body
bodyWidget.description=Request body (for POST, PUT, PATCH). Supports {{param}} template substitution.
headersJsonWidget.label=Headers (JSON)
headersJsonWidget.description=Additional HTTP headers as JSON object (e.g., {"X-Custom": "value"})
queryParamsJsonWidget.label=Query Parameters (JSON)
queryParamsJsonWidget.description=URL query parameters as JSON object (e.g., {"page": "1", "limit": "10"})
templateParamsJsonWidget.label=Template Parameters (JSON)
templateParamsJsonWidget.description=Values for {{param}} substitution in URL, path, body, and headers (e.g., {"userId": "42"})
optionsGroup.label=Connection Options
timeoutMsWidget.label=Timeout (ms)
timeoutMsWidget.description=Request timeout in milliseconds (default: 30000)
verifySslWidget.label=Verify SSL Certificates
verifySslWidget.description=Enable SSL certificate verification (disable for self-signed certificates)
advancedGroup.label=Advanced (PBConfiguration Override)
configJsonWidget.label=Configuration JSON
configJsonWidget.description=Optional: Full PBConfiguration JSON. When provided, this overrides ALL individual fields above and delegates directly to ConnectorExecutionEngine.
