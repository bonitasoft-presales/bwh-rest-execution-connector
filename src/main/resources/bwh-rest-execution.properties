ProcessBuilder.category=Process Builder Connectors
connectorDefinitionLabel=PB REST Execution
connectorDefinitionDescription=Executes REST API calls using PBConfiguration JSON. Auth, headers, methods, and template substitution are resolved from the configuration. Supports BASIC, BEARER, API_KEY, and OAuth2 authentication.

# Page: Configuration
configPage.pageTitle=REST Configuration
configPage.pageDescription=The configJson parameter receives the full PBConfiguration JSON (resolved by the configJson() Groovy script in PE_RestAPIConnector). All auth, headers, methods, and overrides are included.
configGroup.label=Configuration
configJsonWidget.label=Configuration JSON
configJsonWidget.description=Full PBConfiguration JSON with auth, baseUrl, methods[], and overrides. Built automatically by the configJson() script from PBActionContent.contentRef + parameters.
optionsGroup.label=Options
verifySslWidget.label=Verify SSL Certificates
verifySslWidget.description=Enable SSL certificate verification (disable for self-signed certificates)
fileUploadGroup.label=File Upload (Multipart)
fileContentBase64Widget.label=File Content (Base64)
fileContentBase64Widget.description=Base64-encoded file content for multipart/related upload (e.g. Google Drive, Cloud Storage). Leave empty if no file upload is needed.
fileContentTypeWidget.label=File Content Type
fileContentTypeWidget.description=MIME type of the file being uploaded (e.g. application/pdf, image/png, text/csv). Required when File Content is provided.
fileNameWidget.label=File Name
fileNameWidget.description=Original file name (e.g. report.pdf). Used by DOC_NAME placeholderConfig mode to resolve {{name}} placeholders in metadata templates.
